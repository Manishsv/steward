// Minimal subset of OpenShell sandbox.proto for draft policy governance.
// Source reference: OpenShell/proto/sandbox.proto (do not edit upstream here).

syntax = "proto3";

package openshell.sandbox.v1;

message NetworkPolicyRule {
  string name = 1;
  repeated NetworkEndpoint endpoints = 2;
  repeated NetworkBinary binaries = 3;
}

message NetworkEndpoint {
  string host = 1;
  uint32 port = 2;
  string protocol = 3;
  string tls = 4;
  string enforcement = 5;
  string access = 6;
  repeated L7Rule rules = 7;
  repeated string allowed_ips = 8;
  repeated uint32 ports = 9;
}

message L7Rule {
  L7Allow allow = 1;
}

message L7Allow {
  string method = 1;
  string path = 2;
  string command = 3;
}

message NetworkBinary {
  string path = 1;
  bool harness = 2 [deprecated = true];
}

